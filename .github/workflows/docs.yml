name: Deploy docs (Dokka GFM → MkDocs Material → Pages)

on:
  push:
    branches: [master, init] # Déclenchement sur master ou init pour test
    paths:
      - 'shared/src/commonMain/**'
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '25'
          cache: 'gradle'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Install MkDocs Material + plugins
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material mkdocs-awesome-pages-plugin mkdocs-static-i18n

      - name: Generate API docs (Dokka GFM)
        run: |
          ./gradlew --no-daemon :shared:dokkaGfm

      - name: Copy GFM output into docs tree
        run: |
          mkdir -p docs/api/shared
          cp -r shared/build/dokka/gfm/. docs/api/shared/

      - name: Post-process Dokka GFM (clean MkDocs-incompatible artifacts)
        run: |
          python docs/scripts/postprocess_dokka_gfm.py docs/api/shared

      - name: Build site (MkDocs)
        run: mkdocs build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
