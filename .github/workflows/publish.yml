name: Publish to Maven Central

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version (e.g. 2.0.0-SNAPSHOT). Default: 1.0.0-SNAPSHOT'
        required: false
      confirm:
        description: 'Type "snapshot" to publish from this branch'
        required: true

jobs:
  snapshot-on-push:
    if: github.event_name == 'push' && github.ref_name == 'master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '25'
          cache: 'gradle'
      - name: Grant execute permission
        run: chmod +x gradlew
      - name: Publish snapshot
        run: ./gradlew :shared:publishToSonatype --no-daemon --stacktrace
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

  release-on-tag:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '25'
          cache: 'gradle'
      - name: Grant execute permission
        run: chmod +x gradlew
      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
      - name: Publish release
        run: ./gradlew :shared:publishToSonatype closeAndReleaseMavenCentralStagingRepository --no-daemon --stacktrace -PreleaseVersion=${{ env.VERSION }}
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

  snapshot-manual:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'snapshot'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '25'
          cache: 'gradle'
      - name: Grant execute permission
        run: chmod +x gradlew
      - name: Compute version override
        id: version
        run: echo "flag=${{ github.event.inputs.version != '' && format('-PreleaseVersion={0}', github.event.inputs.version) || '' }}" >> $GITHUB_OUTPUT
      - name: Publish snapshot
        run: ./gradlew :shared:publishToSonatype --no-daemon --stacktrace ${{ steps.version.outputs.flag }}
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
