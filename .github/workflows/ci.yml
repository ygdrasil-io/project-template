name: KMP Starter Pack CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build-and-test:
    runs-on: macos-15 # Utilisation de macOS 15 pour supporter les compilations iOS natives si nécessaire
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '25'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # Étape 1 : Détection du mode de test (Deep vs Fast-Track)
      # On vérifie si la cible de la PR est 'master' ou si la branche courante est 'master'
      - name: Determine Test Strategy
        id: test-strategy
        run: |
          if [[ "${{ github.base_ref }}" == "master" || "${{ github.ref }}" == "refs/heads/master" ]]; then
            echo "strategy=deep" >> $GITHUB_OUTPUT
            echo "Running deep tests (All Targets) for master branch / merge request."
          else
            echo "strategy=fast-track" >> $GITHUB_OUTPUT
            echo "Running JVM Fast-Track tests only."
          fi

      # Étape 2 : Exécution Fast-Track (Uniquement JVM)
      # Se lance si nous ne sommes pas sur une PR/push vers master
      - name: Run JVM Fast-Track Tests
        if: steps.test-strategy.outputs.strategy == 'fast-track'
        run: ./gradlew :shared:jvmTest --no-daemon --stacktrace

      # Étape 3 : Exécution Deep (Tous les tests : JVM, Android, iOS Simulator/Link)
      # Se lance uniquement pour les merges/PRs vers master
      - name: Run Deep Tests (JVM, Android & iOS Simulator)
        if: steps.test-strategy.outputs.strategy == 'deep'
        run: ./gradlew allTests --no-daemon --stacktrace
